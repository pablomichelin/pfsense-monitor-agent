services:
  nginx:
    image: nginx:stable-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:8088"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- "http://$$HOSTNAME:8088/login" >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: ./infra/docker/api.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env.api
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "fetch(\"http://127.0.0.1:8088/healthz\").then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: ./infra/docker/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./.env.web
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- "http://$$HOSTNAME:3000/dashboard" >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:17
    env_file:
      - ./.env.db
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
